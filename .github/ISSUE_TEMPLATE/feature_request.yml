name: Feature request
description: Suggest a new entity, service, or capability.
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe the *outcome* you want, not just the implementation — that lets us evaluate whether the underlying FranklinWH cloud API can support it before promising work.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      placeholder: "e.g. I can't see per-phase grid power in the Energy dashboard."
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      placeholder: "e.g. Expose `gridFeedMaxFlag.phaseA/B/C` from `getPowerControlSetting` as three sensors."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways you've thought about solving this — template sensors, automations, third-party tools.

  - type: textarea
    id: api_evidence
    attributes:
      label: API evidence (optional but very helpful)
      description: |
        If you've inspected the FranklinWH cloud API and seen the field/endpoint that would back this feature, paste the raw JSON or endpoint name here. The integration depends on the upstream `franklinwh` Python package, so support typically requires either the field already exists there or upstream adds it.
      render: json

  - type: input
    id: gateway_model
    attributes:
      label: Gateway model / firmware
      placeholder: "e.g. aGate v2 — fw 1.4.7"

  - type: checkboxes
    id: terms
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and Discussions for similar requests.
          required: true
        - label: I understand the integration only exposes data the FranklinWH cloud API actually returns.
          required: true
